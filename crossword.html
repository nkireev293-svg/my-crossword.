<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кроссворд: Информационное право</title>
    <style>
        :root {
            --cell-size: 30px;
            --accent: #2196F3;
            --success: #4CAF50;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .container { display: flex; gap: 30px; max-width: 1300px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        .questions { width: 450px; height: 650px; overflow-y: auto; padding-right: 15px; border-right: 1px solid #eee; }
        .questions h3 { color: #333; position: sticky; top: 0; background: white; margin: 0; padding: 10px 0; border-bottom: 2px solid var(--accent); }
        
        .q-item { 
            margin-bottom: 15px; 
            font-size: 13px; 
            line-height: 1.4; 
            color: #444; 
            padding: 8px;
            border-radius: 6px;
            background: #f9f9f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .q-item b { color: var(--accent); margin-right: 5px; }
        
        .reveal-word-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 10px;
            flex-shrink: 0;
        }
        .reveal-word-btn:hover { background: #1976D2; }

        .crossword-grid {
            display: grid;
            grid-template-columns: repeat(25, var(--cell-size));
            grid-template-rows: repeat(22, var(--cell-size));
            gap: 1px;
            background: #ddd;
            border: 2px solid #444;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-weight: bold;
            text-transform: uppercase;
        }

        .empty { background: #2c3e50; border: none; }
        
        .letter {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .letter.reveal { opacity: 1; transform: translateY(0); color: var(--success); }
        
        .num {
            position: absolute;
            top: 1px;
            left: 1px;
            font-size: 8px;
            color: #999;
        }
    </style>
</head>
<body>

<h2>Интерактивный Кроссворд по Информационному Праву</h2>

<div class="container">
    <div class="questions" id="questions-list">
        <h3>Вопросы </h3>
        </div>

    <div class="crossword-grid" id="grid">
        </div>
</div>

<script>
    const data = [
        { id: 1, word: "свободный", q: "Право граждан на ... доступ к информации.", r: 1, c: 2 },
        { id: 2, word: "информация", q: "Сведения независимо от формы их представления.", r: 3, c: 1 },
        { id: 3, word: "система", q: "Совокупность баз данных и технологий.", r: 5, c: 3 },
        { id: 4, word: "документ", q: "Информация, заверенная электронной подписью.", r: 7, c: 2 },
        { id: 5, word: "подпись", q: "Реквизит для защиты от подделки.", r: 9, c: 5 },
        { id: 6, word: "тайна", q: "Информация, позволяющая увеличить доходы (коммерческая...).", r: 11, c: 1 },
        { id: 7, word: "персональные", q: "Информация о фактах жизни гражданина (данные).", r: 13, c: 4 },
        { id: 8, word: "гражданское", q: "Отрасль права, тесно связанная с информационным.", r: 2, c: 12 },
        { id: 9, word: "гостайна", q: "Информация, составляющая государственный секрет.", r: 4, c: 12 },
        { id: 10, word: "инфосфера", q: "Область деятельности, связанная с инфо-потреблением.", r: 6, c: 12 },
        { id: 11, word: "защита", q: "Деятельность по предотвращению утечки информации.", r: 8, c: 12 },
        { id: 12, word: "носитель", q: "Материальный объект, хранящий данные.", r: 10, c: 12 },
        { id: 13, word: "конфиденциальность", q: "Требование не передавать данные третьим лицам.", r: 12, c: 2 },
        { id: 14, word: "цифровизация", q: "Процесс перехода к инфо. обществу.", r: 15, c: 6 },
        { id: 15, word: "право", q: "Совокупность норм в сфере информации.", r: 17, c: 10 }
    ];

    const gridEl = document.getElementById('grid');
    const qListEl = document.getElementById('questions-list');

    // 1. Создаем пустую сетку 25x22
    for (let r = 0; r < 22; r++) {
        for (let c = 0; c < 25; c++) {
            const div = document.createElement('div');
            div.id = `c-${r}-${c}`;
            div.className = 'cell empty';
            gridEl.appendChild(div);
        }
    }

    // 2. Размещаем слова и генерируем вопросы
    data.forEach(item => {
        // Добавляем буквы в сетку
        for (let i = 0; i < item.word.length; i++) {
            const cell = document.getElementById(`c-${item.r}-${item.c + i}`);
            cell.className = 'cell';
            cell.innerHTML = (i === 0 ? `<span class="num">${item.id}</span>` : '') + 
                             `<span class="letter word-${item.id}">${item.word[i]}</span>`;
        }

        // Добавляем вопрос в список
        const qDiv = document.createElement('div');
        qDiv.className = 'q-item';
        qDiv.innerHTML = `<span><b>${item.id}.</b> ${item.q}</span>
                          <button class="reveal-word-btn" onclick="revealWord(${item.id})">Открыть</button>`;
        qListEl.appendChild(qDiv);
    });

    // Функция открытия конкретного слова
    function revealWord(id) {
        const letters = document.querySelectorAll(`.word-${id}`);
        letters.forEach((l, index) => {
            setTimeout(() => {
                l.classList.add('reveal');
                l.parentElement.style.backgroundColor = "#e8f5e9"; // Подсветка ячейки
            }, index * 100);
        });
    }
</script>

</body>
</html>
